name: Build DMG

on:
  workflow_dispatch:

jobs:
  build-notarize:
    name: Build, notarize, and staple DMG
    runs-on: macos-26
    environment: release
    timeout-minutes: 75
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Nix
        uses: DeterminateSystems/determinate-nix-action@v3.21.2

      - name: Check toolchain
        run: nix develop .#xcode-work --command -- make check-toolchain

      - name: Import Developer ID certificate
        env:
          DEVELOPER_ID_P12_BASE64: ${{ secrets.DEVELOPER_ID_P12_BASE64 }}
          DEVELOPER_ID_P12_PASSWORD: ${{ secrets.DEVELOPER_ID_P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail

          certificate_path="$RUNNER_TEMP/hisle-ci-developer-id.p12"
          keychain_path="$RUNNER_TEMP/hisle-signing.keychain-db"

          echo "$DEVELOPER_ID_P12_BASE64" | base64 --decode > "$certificate_path"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$keychain_path"
          security import "$certificate_path" -P "$DEVELOPER_ID_P12_PASSWORD" -A -t cert -f pkcs12 -k "$keychain_path"
          security list-keychains -d user -s "$keychain_path"
          security default-keychain -d user -s "$keychain_path"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$keychain_path"
          security find-identity -p codesigning -v

      - name: Run core spec check
        run: nix develop --command -- make core-spec-check

      - name: Build signed Release DMG
        env:
          DEVELOPMENT_TEAM: ${{ vars.DEVELOPMENT_TEAM }}
          CODE_SIGN_IDENTITY: ${{ vars.CODE_SIGN_IDENTITY }}
          DMG_SIGN_IDENTITY: ${{ vars.DMG_SIGN_IDENTITY }}
        run: |
          set -euo pipefail

          nix develop .#xcode-work --command -- make dmg \
            CONFIGURATION=Release \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM="$DEVELOPMENT_TEAM" \
            CODE_SIGN_IDENTITY="$CODE_SIGN_IDENTITY" \
            DMG_SIGN_IDENTITY="$DMG_SIGN_IDENTITY"

      - name: Export release metadata
        id: release_metadata
        run: |
          set -euo pipefail

          app_info_plist="build/Release/hisle.app/Contents/Info.plist"
          app_version="$(/usr/libexec/PlistBuddy -c "Print :CFBundleShortVersionString" "$app_info_plist")"

          if [[ ! "$app_version" =~ ^[0-9]+(\.[0-9]+){0,2}$ ]]; then
            echo "::error::Invalid app version for release: $app_version"
            exit 1
          fi

          release_tag="v$app_version"
          dmg_name="hisle-$app_version.dmg"
          dmg_path="build/dist/$dmg_name"
          artifact_name="hisle-$app_version-dmg"

          if [[ ! -f "$dmg_path" ]]; then
            echo "::error::Missing expected DMG: $dmg_path"
            exit 1
          fi

          {
            echo "APP_VERSION=$app_version"
            echo "RELEASE_TAG=$release_tag"
            echo "DMG_PATH=$dmg_path"
          } >> "$GITHUB_ENV"

          {
            echo "app_version=$app_version"
            echo "dmg_path=$dmg_path"
            echo "artifact_name=$artifact_name"
          } >> "$GITHUB_OUTPUT"

      - name: Prepare notary API key
        env:
          NOTARY_API_KEY_BASE64: ${{ secrets.NOTARY_API_KEY_BASE64 }}
        run: |
          set -euo pipefail

          mkdir -p "$RUNNER_TEMP/notary"
          echo "$NOTARY_API_KEY_BASE64" | base64 --decode > "$RUNNER_TEMP/notary/AuthKey.p8"
          chmod 600 "$RUNNER_TEMP/notary/AuthKey.p8"

      - name: Notarize and staple DMG
        env:
          NOTARY_API_KEY_PATH: ${{ runner.temp }}/notary/AuthKey.p8
          NOTARY_API_KEY_ID: ${{ secrets.NOTARY_API_KEY_ID }}
          NOTARY_API_ISSUER_ID: ${{ secrets.NOTARY_API_ISSUER_ID }}
          NOTARY_TIMEOUT: 45m
        run: nix develop --command -- nu tools/notary.nu

      - name: Upload notary logs
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: notary-logs
          path: build/notary
          if-no-files-found: ignore

      - name: Validate stapled DMG ticket
        run: |
          set -euo pipefail

          /usr/bin/xcrun stapler validate "$DMG_PATH"

      - name: Validate DMG extraction with undmg
        run: |
          set -euo pipefail

          extract_dir="$(mktemp -d)"
          trap 'rm -rf "$extract_dir"' EXIT
          dmg_abs="$PWD/$DMG_PATH"

          nix develop --command -- sh -c 'cd "$1" && undmg "$2"' sh "$extract_dir" "$dmg_abs"

          if [[ ! -f "$extract_dir/hisle.app/Contents/Info.plist" ]]; then
            echo "::error::undmg did not extract hisle.app/Contents/Info.plist from $DMG_PATH"
            exit 1
          fi

      - name: Export DMG file hash
        id: dmg_hash
        run: |
          set -euo pipefail

          dmg_nix_hash="$(nix hash file --type sha256 --sri "$DMG_PATH")"

          {
            echo "DMG_NIX_HASH=$dmg_nix_hash"
          } >> "$GITHUB_ENV"

          {
            echo "dmg_nix_hash=$dmg_nix_hash"
          } >> "$GITHUB_OUTPUT"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.release_metadata.outputs.artifact_name }}
          path: ${{ steps.release_metadata.outputs.dmg_path }}
          if-no-files-found: error

      - name: Summarize release candidate
        run: |
          set -euo pipefail

          {
            echo "## Release candidate"
            echo ""
            echo "| Field | Value |"
            echo "| --- | --- |"
            echo "| Version | \`$APP_VERSION\` |"
            echo "| DMG SHA | \`$DMG_NIX_HASH\` |"
            echo "| DMG path | \`$DMG_PATH\` |"
            echo "| Tag to package | \`$RELEASE_TAG\` |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Delete temporary keychain
        if: always()
        run: security delete-keychain "$RUNNER_TEMP/hisle-signing.keychain-db" || true
